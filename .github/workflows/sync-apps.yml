name: Sync Play Store apps

on:
  schedule:
    - cron: '0 3 * * *' # daily at 3am UTC
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm install google-play-scraper
      - run: npm run fetch-apps

      - name: Commit updated app list
        run: |
          git config user.name "amanblaze-bot"
          git config user.email "bot@amanblaze.com"
          git add src/data/apps.json
          git diff --cached --quiet || git commit -m "chore: sync app catalog from Google Play"
          git push
