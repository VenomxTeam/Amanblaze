name: Sync Play Store apps

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install
          npm install google-play-scraper

      - name: Fetch Play Store apps
        run: npm run fetch-apps

      - name: Commit and push changes
        run: |
          git config user.name "amanblaze-bot"
          git config user.email "bot@amanblaze.com"

          git add src/data/apps.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: sync app catalog from Google Play"

          git pull --rebase origin main
          git push origin main
