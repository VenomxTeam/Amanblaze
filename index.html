    <!-- Security Script to discourage DevTools and Source viewing -->
    <script>
      // Disable right-click
      document.addEventListener('contextmenu', function (e) {
        e.preventDefault();
      });

      // Disable keyboard shortcuts
      document.addEventListener('keydown', function (e) {
        // F12
        if (e.key === 'F12' || e.keyCode === 123) {
          e.preventDefault();
        }
        // Ctrl+Shift+I (Windows/Linux) or Cmd+Opt+I (Mac)
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.keyCode === 73)) {
          e.preventDefault();
        }
        // Ctrl+Shift+J (Windows/Linux) or Cmd+Opt+J (Mac)
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j' || e.keyCode === 74)) {
          e.preventDefault();
        }
        // Ctrl+U (Windows/Linux) or Cmd+Opt+U (Mac) - View Source
        if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) {
          e.preventDefault();
        }
        // Ctrl+Shift+C (Windows/Linux) or Cmd+Opt+C (Mac) - Inspect Element
        if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'C' || e.key === 'c' || e.keyCode === 67)) {
          e.preventDefault();
        }
      });
      
      // Basic anti-debugger trap
      setInterval(function() {
        var before = new Date().getTime();
        debugger;
        var after = new Date().getTime();
        if (after - before > 100) {
          document.body.innerHTML = "Security Error: Developer Tools detected.";
        }
      }, 1000);
    </script>
